{% extends "base_parent.html" %}
{% block content %}
<div class="card shadow">
    <div class="card-header bg-white py-3">
        <h5 class="mb-0">Recent Attendance Record</h5>
    </div>
    <div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead class="table-light">
                <tr>
                    <th>Date</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                {% for record in attendance %}
                <tr>
                    <td>{{ record.attendance_date }}</td>
                    <td>
                        {% if record.status == 'Present' %}
                            <span class="text-success fw-bold"><i class="bi bi-check-circle"></i> Present</span>
                        {% else %}
                            <span class="text-danger fw-bold"><i class="bi bi-x-circle"></i> Absent</span>
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

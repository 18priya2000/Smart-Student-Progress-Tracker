{% extends "base_parent.html" %}
{% block content %}
<div class="row">
    <div class="col-md-5">
        <div class="card shadow mb-4">
            <div class="card-body">
                <h5>Apply for New Leave</h5>
                <form method="POST">
                    <div class="mb-3">
                        <label>Date</label>
                        <input type="date" name="date" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Reason</label>
                        <textarea name="reason" class="form-control" required></textarea>
                    </div>
                    <button class="btn btn-warning w-100 fw-bold">Submit Application</button>
                </form>
            </div>
        </div>
    </div>
    <div class="col-md-7">
        <div class="card shadow">
            <div class="card-header bg-white">
                <h5 class="mb-0">Recent Leave Status (Last 4)</h5>
            </div>
            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for l in leaves %}
                        <tr>
                            <td>{{ l.date }}</td>
                            <td>
                                <span class="badge {% if l.status == 'Approved' %}bg-success{% elif l.status == 'pending' %}bg-warning{% else %}bg-danger{% endif %}">
                                    {{ l.status }}
                                </span>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
